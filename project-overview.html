    <script>
        var navLinks = document.querySelector('.links');
        function  showMenu(){

            navLinks.style.left = '-100%';
        }
    </script>

    <script src="projects-data.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({
            selector: '.glightbox',
            touchNavigation: true,
            loop: true,
            zoomable: true,
            openEffect: 'zoom',
            closebutton: true
        });
    </script>

<script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');

    const project = projectsData?.[projectId]; 

    if (!project) {
        document.body.innerHTML = "<h1>Project not found</h1>";
    } else {
        document.querySelector('.txt-container h1').textContent = project.title;
        document.querySelector('.txt-container h2').textContent = project.subtitle;
        document.querySelector('.txt-container p').innerHTML = `<span>My role :</span> ${project.role}`;
        const video = document.getElementById('project-video');
            if (project.video) {
                video.src = project.video;
                video.load();
            }

        document.getElementById('project-overview').textContent = project.overview;
        document.getElementById('project-problem').textContent = project.problem;
        document.getElementById('project-solution').textContent = project.solution;
        document.getElementById('project-result').textContent = project.result;

        const featuresList = document.getElementById('project-features');
        featuresList.innerHTML = '';
        project.features.forEach(feature => {
        const li = document.createElement('li');
        li.textContent = feature;
        featuresList.appendChild(li);
        });



        const techList = document.querySelector('.tech-stack ul');
        techList.innerHTML = '';
        project.tech.forEach(t => {
            const li = document.createElement('li');
            li.textContent = t;
            techList.appendChild(li);
        });

        document.querySelector('.overview-links a:nth-child(1)').href = project.live;
        document.querySelector('.overview-links a:nth-child(2)').href = project.github;


        const screenshotsContainer = document.querySelector('.screenshots');
        if (screenshotsContainer) {
            screenshotsContainer.innerHTML = '';
            project.screenshots.forEach(img => {
                screenshotsContainer.innerHTML += `
                    <div class="screenshot">
                        <a href="${img}" class="glightbox" data-gallery="mygallery">
                            <img src="${img}" alt="Screenshot">
                        </a>
                    </div>
                `;
            });
            
            lightbox.reload();

        }
    }
</script>

</body>
</html>
